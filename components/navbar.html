<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Component Navbar</title>
    <!-- Import Poppins dari Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

    <style>
        /* ini reset nilai default hiraukan */
        * {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            gap: 50px;
            justify-content: center;
            width: 100vw;
            height: 100vh;
            background-color: antiquewhite;
            font-family: 'Poppins', sans-serif;
        }


        /* ini baru styling yang harus ada ketika mau nambahin component nya guyse */
        nav {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 20px;
            background-color: white;
        }

        #siporma-logo {
            background-image: url('../assets/siporma-logo.svg');
            width: 250px;
            height: 50px;
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
        }

        .navMenu {
            display: flex;
            gap: 10px;
            list-style: none;
        }

        .navMenu li a {
            text-decoration: none;
            padding: 1px 0px;
            font-weight: 600;
            color: #707071;
        }

        .navMenu .active {
            color: #0D9488;
            border-bottom: 3px solid #0D9488;
        }

        nav .action-buttons {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        nav .action-buttons a {
            text-decoration: none;
            padding: 10px 10px;
            color: #0D9488;
            font-weight: 600;
            display: flex;
            align-items: center;
            background-color: white;
        }

        nav .action-buttons a:nth-last-child(1) {
            text-decoration: none;
            padding: 10px 20px;
            background-color: #0D9488;
            color: white;
            border-radius: 5px;
            font-weight: 600;
            display: flex;
            align-items: center;
        }
    </style>
</head>

<body>
    <nav>
        <div id="siporma-logo"></div>
        <ul class="navMenu">
            <li><a href="" class="active">Beranda</a></li>
            <li><a href="">Pusat Bantuan</a></li>
        </ul>
        <div class="action-buttons">
            <a href="#">Register</a>
            <a href="#">Lapor Sekarang</a>
        </div>
    </nav>

    <br />
    <br />
    <br />

    <nav>
        <div id="siporma-logo"></div>
        <ul class="navMenu">
            <li><a href="" class="active">Dashboard</a></li>
            <li><a href="">Pusat Bantuan</a></li>
        </ul>
        <div class="action-buttons">
            <a href="#"><img src="../assets/icons/notification.svg" alt="icon" width="20" height="20"></a>
            <a href="#"><img src="../assets/icons/profile.svg" alt="icon" width="20" height="20"></a>
            <a href="#">Lapor Sekarang</a>
        </div>
    </nav>
</body>

</html>
