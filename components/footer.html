<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Footer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            box-sizing: border-box;
        }

        body {
            display: flex;
            align-items: center;
            width: 100vw;
            height: 100vh;
            background-color: antiquewhite;
            font-family: 'Poppins', sans-serif;
        }

        footer {
            width: 100%;
            background-color: white;
            display: flex;
            align-items: center;
            justify-content: end;
            padding: 60px 40px ;
            gap: 70px;
            background-image: url("../assets/bg-footer.svg");
            background-position: left;
            background-size: cover;
            background-repeat: no-repeat;
        }

        .footer-brand {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .footer-brand P:nth-child(1) {
            color: #0A6F66;
            font-weight: 700;
            font-size: 20px;
        }

        .footer-brand P:nth-child(2) {
            width: 470px;
            color: #3F4945;
            font-size: 12px;
        }

        .footer-links {
            display: flex;
            text-transform: uppercase;
            gap: 32px;
            font-size: 12px;
            color: #3F4945;
        }

        .footer-links div {
            display: flex;
            flex-direction: column;
            gap: 10px;
        } 

        .footer-actions {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
        }

        .footer-actions a {
            background-color: #E5E9E8;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #E5E9E8;
            border-radius: 12px;
            height: 40px;
            width: 40px;
        }
    </style>
</head>

<body>
    <footer>
        <div class="footer-brand">
            <p>SIPOR-MA</p>
            <p>© 2026 SIPOR-MA. ALL RIGHTS RESERVED</p>
        </div>

        <div class="footer-links">
            <div>
                <p>kebijakan privasi</p>
                <p>syarat & ketentuan</p>
            </div>
            <div>
                <p>kontak kami</p>
                <p>pusat bantuan</p>
            </div>
        </div>
        <div class="footer-actions">
            <a href=""><img src="../assets/icons/globe-logo.svg" alt="icon"></a>
            <a href=""><img src="../assets/icons/massage-icon.svg" alt="icon"></a>
        </div>
    </footer>
</body>

</html>
