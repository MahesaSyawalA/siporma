<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>header component</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* ini reset nilai default hiraukan */
        * {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            gap: 50px;
            width: 100vw;
            height: 100vh;
            background-color: black;
            font-family: 'Poppins', sans-serif;
        }

        /* style header */
        nav {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            padding: 21px;
            background-color: white;

            .icon-button {
                display: flex;
                gap: 10px;

                .menu-button {
                    display: flex;
                    background: transparent;
                    cursor: pointer;
                    border: none;
                    color: #707071;

                }

                a {
                    text-decoration: none;
                    color: #707071;
                    display: flex;
                    align-items: center;
                }

                a:first-of-type:hover {
                    color: #0D9488;
                }
            }



            a:last-of-type {
                display: flex;
                align-items: center;
                gap: 10px;
                text-align: right;
                text-decoration: none;
                color: #707071;
                font-size: 12px;

                p:first-of-type {
                    color: black;
                    font-weight: 600;
                }

                img {
                    width: 42px;
                    height: 42px;
                    border-radius: 100%;
                }
            }
        }

        @media(min-width:1024px) {
            nav {
                justify-content: end;

                .icon-button {
                    .menu-button {
                        display: none;
                    }
                }
            }
        }
    </style>
</head>

<body>
    <nav>
        <div class="icon-button">
            <button class="menu-button">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="lucide lucide-menu-icon lucide-menu">
                    <path d="M4 5h16" />
                    <path d="M4 12h16" />
                    <path d="M4 19h16" />
                </svg>
            </button>
            <a href="#" class="">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M7.70117 15.75C7.83283 15.978 8.02218 16.1674 8.25021 16.299C8.47823 16.4306 8.73688 16.4999 9.00017 16.4999C9.26346 16.4999 9.52212 16.4306 9.75014 16.299C9.97816 16.1674 10.1675 15.978 10.2992 15.75"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    <path

        </div>

        <a href="">
