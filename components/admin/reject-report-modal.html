<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal Penolakan</title>
    <style>
      
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #181C1C;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.25);
            display: flex; 
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-card {
            width: 90%;
            max-width: 700px;
            background: #FFFFFF;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .modal-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .icon-reject {
            width: 24px;
            height: 24px;
            color: #FF3B3B;
        }

        .header-title {
            font-size: 18px;
            font-weight: 700;
            color: #181C1C;
        }

        .modal-body {
            margin-bottom: 25px;
        }

        textarea {
            width: 100%;
            height: 180px;
            background: #E9EEED;
            border: none;
            border-radius: 10px;
            padding: 20px;
            font-size: 14px;
            color: #666;
            resize: none;
            outline: none;
        }

        textarea:focus {
            background: #fdfdfd;
            box-shadow: inset 0 0 0 1px #FF3B3B;
        }

        .modal-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .info-text {
            font-size: 12px;
            color: #B2B9B8;
            font-weight: 400;
        }

        .btn-reject {
            background-color: #FF3B3B;
            color: white;
            border: none;
            padding: 12px 35px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .btn-reject:hover {
            background-color: #e03232;
        }

        @media (max-width: 480px) {
            .modal-footer {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            .btn-reject {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <div class="modal-overlay" id="modalReject">
        
        <div class="modal-card">
            
            <div class="modal-header">
                <div class="icon-reject">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                    </svg>
                </div>
                <div class="header-title">Kirim Pesan Penolakan ke Pelapor</div>
            </div>

            <div class="modal-body">
                <textarea placeholder="Tulis instruksi atau konfirmasi untuk mahasiswa pelapor..."></textarea>
            </div>

            <div class="modal-footer">
                <div class="info-text">Pelapor akan menerima notifikasi</div>
                <button class="btn-reject">Kirim Pesan</button>
            </div>

        </div>
    </div>

</body>
</html>
