<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal Konfirmasi</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #222;
            gap: 10px;
        }

        /* Overlay Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        /* Card Modal */
        .modal-card {
            width: 450px; /* Sedikit lebih kecil untuk konfirmasi */
            background: white;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        /* Header */
        .modal-header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px dashed #3498db;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #181C1C;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #000;
        }

        /* Body */
        .modal-body {
            padding: 25px 20px;
            text-align: center;
        }

        .confirm-text {
            font-size: 15px;
            color: #333;
            line-height: 1.5;
            margin: 0;
        }

        /* Footer */
        .modal-footer {
            padding: 0 20px 25px 20px;
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        /* Button Style */
        .btn {
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            border: none;
            transition: opacity 0.2s;
            min-width: 100px;
        }

        .btn:hover {
            opacity: 0.9;
        }

        /* Tombol Tidak / Batal */
        .btn-no {
            background-color: #E5E9E8;
            color: #666;
        }

        .btn-yes {
            background-color: #3498db;
            color: white;
        }
    </style>
</head>

<body>

    <button id="openConfirm">Buka Modal Konfirmasi</button>

    <div class="modal-overlay" id="confirmOverlay">
        <div class="modal-card">

            <div class="modal-header">
                <div class="header-title">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#3498db" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                        <line x1="12" y1="17" x2="12.01" y2="17"></line>
                    </svg>
                    Konfirmasi Tindakan
                </div>
                <button class="close-btn" id="closeConfirm">&times;</button>
            </div>

            <div class="modal-body">
                <p class="confirm-text">Apakah Anda yakin ingin memproses data ini? Tindakan ini tidak dapat dibatalkan.</p>
            </div>

            <div class="modal-footer">
                <button class="btn btn-no" id="btnNo">Tidak</button>
                <button class="btn btn-yes" id="btnYes">Iya, Lanjutkan</button>
            </div>

        </div>
    </div>

    <script>
        const openBtn = document.getElementById('openConfirm');
        const overlay = document.getElementById('confirmOverlay');
        const closeBtn = document.getElementById('closeConfirm');
        const btnNo = document.getElementById('btnNo');
        const btnYes = document.getElementById('btnYes');

        openBtn.addEventListener('click', () => {
            overlay.classList.add('active');
        });

        const closeModal = () => {
            overlay.classList.remove('active');
        };

        closeBtn.addEventListener('click', closeModal);
        btnNo.addEventListener('click', closeModal);
        btnYes.addEventListener('click', () => {
            console.log("User memilih Iya");
            closeModal();
        });

        window.addEventListener('click', (e) => {
            if (e.target === overlay) {
                closeModal();
            }
        });
    </script>
</body>

</html>
