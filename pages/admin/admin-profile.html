<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile</title>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Syne:wght@600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="admin-profile.css">
</head>

<body>
    <!-- ─── MAIN ─── -->
    <main>
        <div class="card profile-header">
            <div class="avatar-wrap">
                <img class="avatar-placeholder" src="https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Finitu.id%2Fwp-content%2Fuploads%2F2024%2F09%2FGibran_Rakabuming_Raka_Candidate_for_Vice_President_of_Indonesia_2024.jpg&f=1&nofb=1&ipt=d8e84adcc6e8c83947e6a8989ce90483ba01b4d49485bd8728f1e357d24bec6e" alt="">
                <div class="avatar-edit">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
                    </svg>
                </div>
            </div>
            <div class="profile-info">
                <div class="profile-name">
                    <span class="crown">Administrator</span> 
                </div>
                <div class="profil-info">
                    <div class="profil-id">ID : ADM-1998</div>
                    <div class="profil-id">SUPER ADMIN</div>
                    <div class="profil-location">
                        <svg width="13" height="16" viewBox="0 0 13 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12.5 6.5C12.5 10.2448 8.34575 14.1447 6.95075 15.3492C6.82079 15.447 6.6626 15.4998 6.5 15.4998C6.3374 15.4998 6.17921 15.447 6.04925 15.3492C4.65425 14.1447 0.5 10.2448 0.5 6.5C0.5 4.9087 1.13214 3.38258 2.25736 2.25736C3.38258 1.13214 4.9087 0.5 6.5 0.5C8.0913 0.5 9.61742 1.13214 10.7426 2.25736C11.8679 3.38258 12.5 4.9087 12.5 6.5Z" stroke="#0A6F66" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M6.5 8.75C7.74264 8.75 8.75 7.74264 8.75 6.5C8.75 5.25736 7.74264 4.25 6.5 4.25C5.25736 4.25 4.25 5.25736 4.25 6.5C4.25 7.74264 5.25736 8.75 6.5 8.75Z" stroke="#0A6F66" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        <p>Gedung lama C</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Two Column Section -->
        <div class="two-col">
            <!-- Left Column -->
            <div style="display:flex;flex-direction:column;gap:22px;">

                <!-- Informasi Akun -->
                <div class="card">
                    <div class="section-title">
                        <div class="section-logo">
                            <svg width="16" height="17" viewBox="0 0 16 17" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M7.66667 9.33333C9.96785 9.33333 11.8333 7.46785 11.8333 5.16667C11.8333 2.86548 9.96785 1 7.66667 1C5.36548 1 3.5 2.86548 3.5 5.16667C3.5 7.46785 5.36548 9.33333 7.66667 9.33333Z" stroke="#F6FCFA" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M14.3333 15.9997C14.3333 14.2316 13.631 12.5359 12.3807 11.2856C11.1305 10.0354 9.43478 9.33301 7.66667 9.33301C5.89856 9.33301 4.20286 10.0354 2.95262 11.2856C1.70238 12.5359 1 14.2316 1 15.9997" stroke="#F6FCFA" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </div>
                        Informasi Akun
                    </div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label">Nama Lengkap</label>
                            <input class="form-input" type="text" value="administrator" disabled />
                        </div>
                        <div class="form-group">
                            <label class="form-label">ID pegawai</label>
                            <input class="form-input" type="text" value="ADM-1998" disabled/>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Unit Kerja</label>
                            <input class="form-input" type="text" value="admin" disabled />
                        </div>
                        <div class="form-group">
                            <label class="form-label">Email</label>
                            <input class="form-input" type="text" value="admin@example.com" disabled/>
                        </div>
                    </div>
                </div>

                <!-- Pengaturan Notifikasi -->
                <div class="card">
                    <div class="section-title">
                        <div class="section-logo">
                            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M9 18C6.7 18 4.69583 17.2375 2.9875 15.7125C1.27917 14.1875 0.3 12.2833 0.05 10H2.1C2.33333 11.7333 3.10417 13.1667 4.4125 14.3C5.72083 15.4333 7.25 16 9 16C10.95 16 12.6042 15.3208 13.9625 13.9625C15.3208 12.6042 16 10.95 16 9C16 7.05 15.3208 5.39583 13.9625 4.0375C12.6042 2.67917 10.95 2 9 2C7.85 2 6.775 2.26667 5.775 2.8C4.775 3.33333 3.93333 4.06667 3.25 5H6V7H0V1H2V3.35C2.85 2.28333 3.8875 1.45833 5.1125 0.875C6.3375 0.291667 7.63333 0 9 0C10.25 0 11.4208 0.2375 12.5125 0.7125C13.6042 1.1875 14.5542 1.82917 15.3625 2.6375C16.1708 3.44583 16.8125 4.39583 17.2875 5.4875C17.7625 6.57917 18 7.75 18 9C18 10.25 17.7625 11.4208 17.2875 12.5125C16.8125 13.6042 16.1708 14.5542 15.3625 15.3625C14.5542 16.1708 13.6042 16.8125 12.5125 17.2875C11.4208 17.7625 10.25 18 9 18ZM11.8 13.2L8 9.4V4H10V8.6L13.2 11.8L11.8 13.2Z" fill="white"/>
                            </svg>
                        </div>
                        Aktivitas Terakhir
                    </div>
                    <div class="notif-item">
                        <div class="notif-left">
                            <div class="notif-icon">
                                <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="6" cy="6" r="6" fill="#A1E3CB"/>
                                </svg>
                            </div>
                            <div class="notif-text">
                                <h4>Menyetujui Laporan CF-8821</h4>
                                <p>12 Menit yang lalu - Desktop Chrome</p>
                            </div>
                        </div>

                    </div>
                    <div class="notif-item">
                        <div class="notif-left">
                            <div class="notif-icon">
                                <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="6" cy="6" r="6" fill="#A1E3CB"/>
                                </svg>
                            </div>
                            <div class="notif-text">
                                <h4>Mengubah Status Gedung Baru - 04.005</h4>
                                <p>1 Jam yang lalu - Desktop Chrome</p>
                            </div>
                        </div>
                    </div>
                </div>

            </div>

            <!-- Right Column -->
            <div class="right-panel">

                <!-- Keamanan Akun -->
                <div class="card security-card">
                    <div class="section-title">Keamanan Akun</div>
                    <div class="form-group">
                        <label class="form-label">Password Saat Ini</label>
                        <input class="form-input" type="password" placeholder="••••••••" disabled/>
                    </div>
                    <div class="form-group" style="margin-top:14px;">
                        <label class="form-label">Password Baru</label>
                        <input class="form-input" type="password" placeholder="Minimal 8 karakter" disabled/>
                    </div>
                    <div class="form-group" style="margin-top:14px;">
                        <label class="form-label">Konfirmasi Password</label>
                        <input class="form-input" type="password" placeholder="Ulangi password baru" disabled/>
                    </div>
                    <button class="btn-save">Simpan Perubahan</button>
                </div>

            </div>
        </div>

    </main>

</body>

</html>
